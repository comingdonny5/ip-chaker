<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Update Notice</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000; /* ব্যাকগ্রাউন্ড কালো */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .notice-container {
            width: 90%;
            max-width: 400px;
            background: #111;
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.2);
        }

        .icon-box {
            font-size: 50px;
            margin-bottom: 20px;
        }

        .message-box {
            background: #00ff99; /* তোমার চাওয়া সবুজ ব্যাকগ্রাউন্ড */
            color: #000;
            padding: 20px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.6;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0, 255, 153, 0.3);
        }

        .action-btn {
            display: inline-block;
            text-decoration: none;
            background: linear-gradient(90deg, #0099ff, #0066cc); /* ভালো কালারের কলাম/বাটন */
            color: #fff;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 153, 255, 0.4);
            text-transform: uppercase;
        }

        .action-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 153, 255, 0.6);
        }

        .footer-text {
            margin-top: 20px;
            color: #555;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="notice-container">
        <div class="icon-box">🛡️</div>
        
        <div class="message-box">
            এই সাইটটি পার্মানেন্টলি বন্ধ করে আপডেট সাইট চালু করা হয়েছে, আপডেট সাইট পেতে "এগিয়ে যান" এ ক্লিক করুন।
        </div>

        <a href="https://powerbydevil420.github.io/Devil/" class="action-btn">
            এগিয়ে যান
        </a>

        <div class="footer-text">POWERED BY DEVIL</div>
    </div>

</body>
</html>
